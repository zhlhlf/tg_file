name: manual-release

on:
  workflow_dispatch:


permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-latest
          goos: linux
          goarch: amd64
          binary_name: tgfilebot-linux-amd64
        - os: windows-latest
          goos: windows
          goarch: amd64
          binary_name: tgfilebot-windows-amd64.exe
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Build
      shell: bash
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        mkdir -p dist
        go build -buildvcs=false -trimpath -ldflags "-s -w" -o "dist/${{ matrix.binary_name }}" .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.binary_name }}
        path: dist/${{ matrix.binary_name }}
        if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets

    - name: Get short SHA
      id: short_sha
      run: echo "sha=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.short_sha.outputs.sha }}
        name: ${{ steps.short_sha.outputs.sha }}
        files: |
          release-assets/**/tgfilebot-linux-amd64
          release-assets/**/tgfilebot-windows-amd64.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
